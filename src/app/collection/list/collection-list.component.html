<div class="page-content-inner list-page mat-typography" fxLayout="column">
  <gz-fuel-resource-list
    fxFlex
    resourceType="collections"
    [resources]="collections"
    [length]="paginatedCollections.totalCount"
    [finished]="!paginatedCollections?.hasNextPage()"
    (pageChange)="getCollections($event)"
  >
  </gz-fuel-resource-list>
</div>
