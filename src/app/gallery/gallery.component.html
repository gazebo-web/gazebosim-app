@if (images?.length > 0) {
  <div class="gz-gallery-wrapper">
    <div class="gz-main-area">
      <img [src]="images[currentIndex]" class="gz-main-img" alt="Model image" />

      @if (images.length > 1) {
        <button
          class="gz-nav-btn gz-nav-prev"
          (click)="prev()"
          aria-label="Previous image"
        >
          <span class="material-icons">navigate_before</span>
        </button>
        <button
          class="gz-nav-btn gz-nav-next"
          (click)="next()"
          aria-label="Next image"
        >
          <span class="material-icons">navigate_next</span>
        </button>

        <div class="gz-dot-strip" role="tablist" aria-label="Image navigation">
          @for (img of images; track img; let i = $index) {
            <button
              class="gz-dot"
              [class.active]="i === currentIndex"
              (click)="selectImage(i)"
              [attr.aria-label]="'View image ' + (i + 1)"
              [attr.aria-selected]="i === currentIndex"
              role="tab"
            ></button>
          }
        </div>
      }
    </div>

    @if (images.length > 1) {
      <div class="gz-thumbs-strip">
        @for (img of images; track img; let i = $index) {
          <div
            class="gz-thumb"
            [class.active]="i === currentIndex"
            (click)="selectImage(i)"
            [attr.aria-label]="'View image ' + (i + 1)"
          >
            <img [src]="img" alt="Thumbnail {{ i + 1 }}" />
          </div>
        }
      </div>
    }
  </div>
}
