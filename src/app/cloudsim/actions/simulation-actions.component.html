  <!-- Placeholder. Uncomment when implemented. -->

  @if (simulation.isLaunching() || simulation.status === "Running") {
    <button mat-icon-button (click)="stop($event)">
      <mat-icon>stop</mat-icon>
    </button>
  }

  @if (simulation.canBeRestarted()) {
    <button
      mat-icon-button
      (click)="restart($event)"
      title="Restart this simulation"
    >
      <mat-icon>replay</mat-icon>
    </button>
  }

  <button mat-icon-button (click)="download($event)">
    <mat-icon>file_download</mat-icon>
  </button>

  <button mat-icon-button (click)="showMetadata($event)">
    <mat-icon>info</mat-icon>
  </button>

  <a
    mat-icon-button
    [href]="s3bucketLink()"
    target="_blank"
    rel="noopener"
    title="Link to the S3 bucket"
  >
    <mat-icon>folder</mat-icon>
  </a>
</div>
